###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Binds/

# -------------------------------------
# Mod key
# -------------------------------------
$mainMod = SUPER

# -------------------------------------
# Application commands
# -------------------------------------
$terminal = kitty
$browser = brave --password-store=basic
$webapp = $browser --app
$fileManager = uwsm app -- nautilus
$menu = wofi --show drun --insensitive
$hyprctl = ~/.config/hypr/scripts/hyprctl.sh

# -------------------------------------
# Focus-or-launch wrappers
# -------------------------------------
$focus_or_launch = ~/.config/hypr/scripts/focus_or_launch.sh
$start_steam = $focus_or_launch steam steam
$start_browser = $focus_or_launch brave-browser brave --password-store=basic
$start_terminal = $focus_or_launch kitty kitty
$start_signal = $focus_or_launch Signal signal-desktop
$start_chatgpt = $focus_or_launch brave-chat.openai.com__-Default $webapp="https://chat.openai.com"
$start_youtube = $focus_or_launch brave-youtube.com__-Default $webapp="https://youtube.com"
$start_youtube_music = $focus_or_launch brave-music.youtube.com__-Default $webapp="https://music.youtube.com"
$start_excalidraw = $focus_or_launch brave-excalidraw.wayl.one__-Default $webapp="https://excalidraw.wayl.one"
$start_argocd = $focus_or_launch brave-argocd.wayl.one__-Default $webapp="https://argocd.wayl.one"

# -------------------------------------
# App launch and session controls
# -------------------------------------
bind = $mainMod, return, exec, $start_terminal
bind = $mainMod SHIFT, return, exec, $terminal
bind = $mainMod, b, exec, $start_browser
bind = $mainMod SHIFT, b, exec, $browser
bind = $mainMod, A, exec, $start_chatgpt
bind = $mainMod SHIFT, A, exec, $webapp="https://chatgpt.com"
bind = $mainMod, G, exec, $start_signal
bind = $mainMod, L, exec, hyprlock

bind = $mainMod, T, exec, $terminal -e btop
bind = $mainMod, Y, exec, $start_youtube
bind = $mainMod SHIFT, M, exec, $start_youtube_music
bind = $mainMod, I, exec, $start_excalidraw
bind = $mainMod SHIFT, K, exec, $start_argocd
bind = $mainMod SHIFT, Y, exec, $webapp="https://youtube.com/"
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, v, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, SEMICOLON, exec, walker -m emojis
# On Hyprland 0.54+, togglesplit moved to layoutmsg:
# bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, F, fullscreen, 1
bind = $mainMod shift, F, fullscreen, 0

# -------------------------------------
# Screenshot and recording
# -------------------------------------
bind = $mainMod, P, exec, /usr/bin/hyprshot -m region
bind = $mainMod control, P, exec, /usr/bin/hyprshot -m region --freeze
bind = $mainMod shift, P, exec, ~/.config/hypr/scripts/screenrecord.sh region
bind = $mainMod, s, exec, ~/.config/hypr/scripts/screenrecord.sh region

bind = $mainMod shift, P, exec, wl-paste --type image/png > /tmp/clipboard.png && krita /tmp/clipboard.png

# -------------------------------------
# Utility actions
# -------------------------------------
bind = $mainMod, i, exec, $hyprctl dispatch change_gaps 10

bind = $mainMod, W, exec, rofi -show window -theme ~/.config/rofi/gruvbox-medium.rasi

bind = $mainMod CONTROL SHIFT, W, exec, ~/.config/hypr/scripts/wallpaper_fzf.sh

# -------------------------------------
# Wallpaper shortcuts
# -------------------------------------
$wallpaper_prev = ~/.config/hypr/scripts/cycle_wallpaper.sh prev
$wallpaper_next = ~/.config/hypr/scripts/cycle_wallpaper.sh next
bind = $mainMod SHIFT, W, exec, $wallpaper_prev
bind = $mainMod CONTROL, W, exec, $wallpaper_next

# -------------------------------------
# Web app shortcuts
# -------------------------------------
bindd = SUPER, X, X, exec, $webapp="https://x.com/"
bindd = SUPER SHIFT, X, X Post, exec, $webapp="https://x.com/compose/post"

# -------------------------------------
# Focus and workspace navigation
# -------------------------------------
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, J, cyclenext, prev
bind = $mainMod, K, cyclenext, next

bindd = SUPER, code:10, Switch to workspace 1, workspace, 1
bindd = SUPER, code:11, Switch to workspace 2, workspace, 2
bindd = SUPER, code:12, Switch to workspace 3, workspace, 3
bindd = SUPER, code:13, Switch to workspace 4, workspace, 4
bindd = SUPER, code:14, Switch to workspace 5, workspace, 5
bindd = SUPER, code:15, Switch to workspace 6, workspace, 6
bindd = SUPER, code:16, Switch to workspace 7, workspace, 7
bindd = SUPER, code:17, Switch to workspace 8, workspace, 8
bindd = SUPER, code:18, Switch to workspace 9, workspace, 9
bindd = SUPER, code:19, Switch to workspace 10, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# -------------------------------------
# Workspace scroll and mouse drag
# -------------------------------------
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# -------------------------------------
# Audio and brightness keys
# -------------------------------------
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# -------------------------------------
# Menus
# -------------------------------------
bindd = SUPER, PERIOD, Toggle top bar, exec, pkill waybar || waybar &
bindd = SUPER, ESCAPE, Power menu, exec, ~/.config/hypr/scripts/power_menu.sh

# -------------------------------------
# Window rules
# -------------------------------------
# Floating windows
windowrule = match:tag floating-window, float on, center on, size 800 600
windowrule = match:tag big-floating-window, size 1920 1080

windowrule = match:class (blueberry\.py|Impala|Wiremix|org\.gnome\.NautilusPreviewer|com\.gabm\.satty|About|TUI\.float|WallpaperPicker), tag +floating-window
windowrule = match:class btop, tag +big-floating-window
windowrule = match:class (xdg-desktop-portal-gtk|sublime_text|DesktopEditors|org\.gnome\.Nautilus), match:title ^(Open.*Files?|Open Folder|Save.*Files?|Save.*As|Save|All Files), tag +floating-window
windowrule = match:class WallpaperPicker, center on, size 1400 900

# Fullscreen screensaver
windowrule = match:class Screensaver, fullscreen on

# No transparency on media windows
windowrule = match:class ^(zoom|vlc|mpv|org\.kde\.kdenlive|com\.obsproject\.Studio|com\.github\.PintaProject\.Pinta|imv|org\.gnome\.NautilusPreviewer)$, opacity 1.0 override 1.0 override
