name: Build Container Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      date_tag: ${{ steps.determine.outputs.date_tag }}
      version: ${{ steps.determine.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - id: determine
        name: Determine release tags
        run: |
          set -euxo pipefail
          echo "date_tag=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"
          echo "version=$(cat version)" >> "$GITHUB_OUTPUT"

  ubuntu:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Ubuntu image
        env:
          PUSH_TO_REGISTRY: ${{ github.event_name != 'pull_request' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATE_TAG: ${{ needs.prepare.outputs.date_tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euxo pipefail
          if [ "$PUSH_TO_REGISTRY" = "true" ]; then
            PUSH_FLAGS="--push"
          else
            PUSH_FLAGS="--load"
          fi
          docker buildx build \
            --platform linux/amd64 \
            --file docker/Dockerfile \
            --secret id=gh_token,env=GH_TOKEN \
            --tag ghcr.io/waylonwalker/devtainer:latest \
            --tag ghcr.io/waylonwalker/devtainer:${DATE_TAG} \
            --tag ghcr.io/waylonwalker/devtainer:${VERSION} \
            $PUSH_FLAGS \
            .

  slim:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Ubuntu slim image
        env:
          PUSH_TO_REGISTRY: ${{ github.event_name != 'pull_request' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euxo pipefail
          if [ "$PUSH_TO_REGISTRY" = "true" ]; then
            PUSH_FLAGS="--push"
          else
            PUSH_FLAGS="--load"
          fi
          docker buildx build \
            --platform linux/amd64 \
            --file docker/Dockerfile.slim \
            --secret id=gh_token,env=GH_TOKEN \
            --tag ghcr.io/waylonwalker/devtainer:slim \
            --tag ghcr.io/waylonwalker/devtainer:slim-${VERSION} \
            $PUSH_FLAGS \
            .

  arch:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Arch image
        env:
          PUSH_TO_REGISTRY: ${{ github.event_name != 'pull_request' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATE_TAG: ${{ needs.prepare.outputs.date_tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euxo pipefail
          docker build \
            --file docker/Dockerfile.arch-base \
            --tag devtainer:arch-base \
            .
          docker build \
            --file docker/Dockerfile.arch-mise \
            --secret id=gh_token,env=GH_TOKEN \
            --tag ghcr.io/waylonwalker/devtainer:arch \
            --tag ghcr.io/waylonwalker/devtainer:arch-${DATE_TAG} \
            --tag ghcr.io/waylonwalker/devtainer:arch-${VERSION} \
            .
          if [ "$PUSH_TO_REGISTRY" = "true" ]; then
            docker push ghcr.io/waylonwalker/devtainer:arch
            docker push ghcr.io/waylonwalker/devtainer:arch-${DATE_TAG}
            docker push ghcr.io/waylonwalker/devtainer:arch-${VERSION}
          fi

  arch-slim:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Arch slim image
        env:
          PUSH_TO_REGISTRY: ${{ github.event_name != 'pull_request' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATE_TAG: ${{ needs.prepare.outputs.date_tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euxo pipefail
          docker build \
            --file docker/Dockerfile.arch-base \
            --tag devtainer:arch-base \
            .
          docker build \
            --file docker/Dockerfile.arch-slim \
            --secret id=gh_token,env=GH_TOKEN \
            --tag ghcr.io/waylonwalker/devtainer:arch-slim \
            --tag ghcr.io/waylonwalker/devtainer:arch-slim-${DATE_TAG} \
            --tag ghcr.io/waylonwalker/devtainer:arch-slim-${VERSION} \
            .
          if [ "$PUSH_TO_REGISTRY" = "true" ]; then
            docker push ghcr.io/waylonwalker/devtainer:arch-slim
            docker push ghcr.io/waylonwalker/devtainer:arch-slim-${DATE_TAG}
            docker push ghcr.io/waylonwalker/devtainer:arch-slim-${VERSION}
          fi

  alpine:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Alpine image
        env:
          PUSH_TO_REGISTRY: ${{ github.event_name != 'pull_request' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euxo pipefail
          if [ "$PUSH_TO_REGISTRY" = "true" ]; then
            PUSH_FLAGS="--push"
          else
            PUSH_FLAGS="--load"
          fi
          docker buildx build \
            --platform linux/amd64 \
            --file docker/Dockerfile.alpine \
            --secret id=gh_token,env=GH_TOKEN \
            --tag ghcr.io/waylonwalker/devtainer:alpine \
            --tag ghcr.io/waylonwalker/devtainer:alpine-${VERSION} \
            $PUSH_FLAGS \
            .

  alpine-slim:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Alpine slim image
        env:
          PUSH_TO_REGISTRY: ${{ github.event_name != 'pull_request' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euxo pipefail
          if [ "$PUSH_TO_REGISTRY" = "true" ]; then
            PUSH_FLAGS="--push"
          else
            PUSH_FLAGS="--load"
          fi
          docker buildx build \
            --platform linux/amd64 \
            --file docker/Dockerfile.alpine-slim \
            --secret id=gh_token,env=GH_TOKEN \
            --tag ghcr.io/waylonwalker/devtainer:alpine-slim \
            --tag ghcr.io/waylonwalker/devtainer:alpine-slim-${VERSION} \
            $PUSH_FLAGS \
            .
